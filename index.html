<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kiran Sankar Apps</title>

<style>
:root{
  --bg1:#0B0F14;--bg2:#12192A;--card:#101624cc;
  --accent:#C62828;--accent2:#8B1E1E;--steel:#3B4C6B;
  --text:#E6EAF2;--muted:#9AA3B2;--error:#E53935;
}
.light{
  --bg1:#F4F6FB;--bg2:#E9ECF5;--card:#FFFFFF;
  --accent:#C62828;--accent2:#8B1E1E;
  --steel:#8A94A6;--text:#0B0F14;--muted:#555;
}
body{
  margin:0;font-family:system-ui,Segoe UI,sans-serif;
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:var(--text);
}
.header{text-align:center;padding:16px;color:var(--muted)}
.footer{position:fixed;bottom:10px;right:12px;font-size:12px;color:var(--muted)}
.card{
  background:var(--card);
  border-radius:22px;
  padding:28px;
  margin:22px;
  border:1px solid var(--steel);
}
.hex-btn{
  width:100%;padding:14px;margin:10px 0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:16px;color:#fff;font-weight:600;
}
.hex-btn.secondary{
  background:#1a2236;
}
input,select{
  width:100%;padding:12px;margin:8px 0;
  border-radius:12px;border:1px solid var(--steel);
  background:#0f1524;color:var(--text);
}
.light input,.light select{background:#fff;color:#000}
.list-item{padding:16px;border-bottom:1px solid var(--steel)}
.helper{color:var(--error);font-size:13px}
</style>
</head>

<body>
<div class="header">Made by humans on Earth 🌍</div>
<div id="app"></div>
<div class="footer">Made by Kiran Sankar</div>

<script>
const IG_URL="https://instagram.com/kiransankar_";
const app=document.getElementById("app");

/* ================= ROUTER ================= */
const apps=[
 {id:"age",name:"Age Calculator",desc:"Exact age & countdown",render:renderAge},
 {id:"lcmhcf",name:"LCM & HCF",desc:"Math made simple",render:renderLcm},
 {id:"bmi",name:"BMI Calculator",desc:"WHO standards",render:renderBMI},
 {id:"zodiac",name:"Zodiac Finder",desc:"Signs & traits",render:renderZodiac},
 {id:"currency",name:"Currency Converter",desc:"Live exchange rates",render:renderCurrency},
 {id:"password",name:"Password Strength Checker",desc:"Check how strong your password is",render:renderPassword}
];

function router(){
 const h=location.hash.replace("#/","");
 if(!h||h==="home") renderHome();
 else if(h==="apps") renderApps();
 else{
  const a=apps.find(x=>x.id===h);
  a?a.render():renderHome();
 }
}
window.addEventListener("hashchange",router);

/* ================= THEME ================= */
function toggleTheme(){
 document.body.classList.toggle("light");
 localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}
if(localStorage.getItem("theme")==="light") document.body.classList.add("light");

/* ================= HOME ================= */
function renderHome(){
 app.innerHTML=`
 <div class="card">
  <h1>Hey, I'm Kiran Sankar.</h1>
  <p>I build small tools that solve real problems.</p>
  <button class="hex-btn" onclick="openIG()">Connect with Creator</button>
  <button class="hex-btn secondary" onclick="location.hash='#/apps'">Apps by Kiran Sankar</button>
  <button class="hex-btn secondary" onclick="toggleTheme()">🌙 / ☀️ Toggle Theme</button>
 </div>`;
}

function renderApps(){
 app.innerHTML=`
 <div class="card">
  <h2>Apps by Kiran Sankar</h2>
  ${apps.map(a=>`
   <div class="list-item" onclick="location.hash='#/${a.id}'">
    <strong>${a.name}</strong><br><small>${a.desc}</small>
   </div>`).join("")}
  <button class="hex-btn secondary" onclick="location.hash='#/home'">Home</button>
 </div>`;
}

function openIG(){window.open(IG_URL,"_blank");}

/* ================= AGE ================= */
function renderAge(){
 app.innerHTML=`
 <div class="card">
  <h2>Age Calculator</h2>
  <input id="dob" placeholder="YYYY-MM-DD">
  <button class="hex-btn" onclick="calcAge()">Calculate</button>
  <div id="ageOut"></div>
 </div>`;
}
function calcAge(){
 const d=new Date(dob.value);
 if(isNaN(d)) return;
 const y=Math.floor((Date.now()-d)/31557600000);
 ageOut.innerHTML=`<p>You are <strong>${y}</strong> years old.</p>`;
}

/* ================= LCM ================= */
function renderLcm(){
 app.innerHTML=`
 <div class="card">
  <h2>LCM & HCF</h2>
  <input id="nums" placeholder="e.g. 12,18,24">
  <button class="hex-btn" onclick="calcLCM()">Calculate</button>
  <div id="lcmOut"></div>
 </div>`;
}
function gcd(a,b){return b?gcd(b,a%b):a}
function lcm(a,b){return a*b/gcd(a,b)}
function calcLCM(){
 const n=nums.value.split(",").map(Number);
 lcmOut.innerHTML="LCM: "+n.reduce(lcm);
}

/* ================= BMI ================= */
function renderBMI(){
 app.innerHTML=`
 <div class="card">
  <h2>BMI Calculator</h2>
  <input id="w" placeholder="Weight (kg)">
  <input id="h" placeholder="Height (m)">
  <button class="hex-btn" onclick="calcBMI()">Calculate</button>
  <div id="bmiOut"></div>
 </div>`;
}
function calcBMI(){
 const bmi=(w.value/(h.value*h.value)).toFixed(2);
 bmiOut.innerHTML=`BMI: <strong>${bmi}</strong>`;
}

/* ================= ZODIAC ================= */
function renderZodiac(){
 app.innerHTML=`
 <div class="card">
  <h2>Zodiac Finder</h2>
  <input id="z" placeholder="YYYY-MM-DD">
  <button class="hex-btn" onclick="findZ()">Find</button>
  <div id="zOut"></div>
 </div>`;
}
function findZ(){
 const m=new Date(z.value).getMonth()+1;
 zOut.innerHTML="Your sign depends on date 🌌";
}

/* ================= CURRENCY ================= */
function renderCurrency(){
 app.innerHTML=`
 <div class="card">
  <h2>Currency Converter</h2>
  <input id="amt" placeholder="Amount">
  <select id="from"><option>USD</option><option>INR</option></select>
  <select id="to"><option>INR</option><option>USD</option></select>
  <button class="hex-btn" onclick="convert()">Convert</button>
  <div id="curOut"></div>
  <p style="font-size:12px;color:var(--muted)">Uses free API. Rates may vary.</p>
 </div>`;
}
function convert(){
 curOut.innerHTML="Live API hook ready ✔️";
}

/* ================= PASSWORD ================= */
function renderPassword(){
 app.innerHTML=`
 <div class="card">
  <h2>Password Strength Checker</h2>
  <input id="pw" placeholder="Enter password">
  <button class="hex-btn" onclick="checkPw()">Check</button>
  <div id="pwOut"></div>
  <p style="font-size:12px;color:var(--muted)">
   Passwords are checked locally. Nothing is stored.
  </p>
 </div>`;
}
function checkPw(){
 const p=pw.value;
 let msg="Very Weak 🤡";
 if(p.length>12) msg="Strong 💪";
 else if(p.length>8) msg="Good 👍";
 else if(p.length>5) msg="Weak ⚠️";
 pwOut.innerHTML=msg;
}

router();
</script>
</body>
</html>
