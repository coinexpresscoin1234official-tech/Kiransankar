<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KS Tech — Apps by Kiran Sankar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ── */
:root{
  --accent:#F5A623;
  --accent2:#E8860A;
  --accent-glow:rgba(245,166,35,0.25);
  --indigo:#3D52D5;
  --indigo-soft:#4F64E8;

  /* dark theme */
  --bg:       #0A0C14;
  --bg2:      #0F1220;
  --surface:  #141826;
  --surface2: #1B2035;
  --border:   rgba(255,255,255,0.07);
  --text:     #EDF0FA;
  --muted:    #7A839E;
  --sub:      #4A5168;
  --card-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
[data-theme="light"]{
  --bg:       #F3F5FB;
  --bg2:      #EAECF7;
  --surface:  #FFFFFF;
  --surface2: #F0F2FC;
  --border:   rgba(0,0,0,0.08);
  --text:     #0F1220;
  --muted:    #5A6380;
  --sub:      #9AA0B8;
  --card-shadow: 0 8px 40px rgba(0,0,0,0.08);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .35s,color .35s;
}

/* ── CANVAS ── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:1;transition:opacity .35s;}
[data-theme="light"] #stars{opacity:0;}

/* ── NAVBAR ── */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
  background:rgba(10,12,20,0.7);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  transition:background .35s,border-color .35s;
}
[data-theme="light"] .navbar{background:rgba(243,245,251,0.8);}
.nav-logo{
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:1.15rem;
  letter-spacing:-0.5px;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#FF8C42);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-logo span{color:var(--text);-webkit-text-fill-color:var(--text);}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-link{
  font-size:14px;font-weight:500;color:var(--muted);
  cursor:pointer;padding:6px 12px;border-radius:8px;
  border:none;background:none;
  transition:color .2s,background .2s;
  font-family:'DM Sans',sans-serif;
}
.nav-link:hover{color:var(--text);background:var(--surface2);}

/* theme toggle */
.theme-toggle{
  width:72px;height:36px;border-radius:18px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;position:relative;
  transition:background .3s;
  flex-shrink:0;
}
.theme-toggle::after{
  content:'';position:absolute;
  top:4px;left:4px;
  width:26px;height:26px;border-radius:50%;
  background:var(--accent);
  transition:transform .3s,background .3s;
  box-shadow:0 0 10px var(--accent-glow);
}
[data-theme="light"] .theme-toggle::after{transform:translateX(36px);}
.theme-icon{font-size:16px;position:absolute;top:50%;transform:translateY(-50%);pointer-events:none;}
.theme-icon.moon{left:8px;}
.theme-icon.sun{right:8px;}

/* ── MAIN ── */
#app{
  position:relative;z-index:1;
  padding-top:64px;
  min-height:100vh;
}

/* ── HOME ── */
.hero{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:calc(100vh - 64px);
  padding:60px 24px 40px;
  text-align:center;
  position:relative;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:100px;padding:6px 16px;
  font-size:13px;color:var(--muted);
  margin-bottom:28px;
  animation:fadeUp .6s ease both;
}
.hero-badge span{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);display:inline-block;
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow);}50%{box-shadow:0 0 0 6px transparent;}}

.hero-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.8rem,7vw,5.2rem);
  font-weight:800;line-height:1.05;
  letter-spacing:-2px;
  margin-bottom:20px;
  animation:fadeUp .6s .1s ease both;
}
.hero-title .accent{
  background:linear-gradient(135deg,var(--accent) 0%,#FF8C42 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{
  font-size:clamp(1rem,2.5vw,1.2rem);
  color:var(--muted);max-width:520px;
  line-height:1.7;margin-bottom:40px;
  font-weight:400;
  animation:fadeUp .6s .2s ease both;
}
.hero-cta{
  display:flex;flex-wrap:wrap;gap:12px;
  justify-content:center;margin-bottom:60px;
  animation:fadeUp .6s .3s ease both;
}
.btn{
  font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:15px;
  padding:13px 26px;border-radius:12px;
  cursor:pointer;border:none;
  display:inline-flex;align-items:center;gap:8px;
  transition:transform .2s,box-shadow .2s,background .2s;
  text-decoration:none;
}
.btn:active{transform:scale(.97);}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#0A0C14;
  box-shadow:0 4px 20px var(--accent-glow);
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(245,166,35,0.4);transform:translateY(-2px);}
.btn-secondary{
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border);
}
.btn-secondary:hover{background:var(--surface2);transform:translateY(-2px);}
.btn-ghost{
  background:transparent;color:var(--muted);
  border:1px solid var(--border);
}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);transform:translateY(-2px);}

/* stat strip */
.stat-strip{
  display:flex;flex-wrap:wrap;gap:2px;
  justify-content:center;
  animation:fadeUp .6s .4s ease both;
}
.stat-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:20px 28px;
  text-align:center;min-width:130px;
}
.stat-num{
  font-family:'Syne',sans-serif;
  font-size:1.9rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),#FF8C42);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.5px;}

/* features */
.features{
  padding:80px 24px;max-width:1100px;margin:0 auto;
}
.section-label{
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);font-weight:600;margin-bottom:12px;
}
.section-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:800;letter-spacing:-1px;
  margin-bottom:48px;line-height:1.15;
}
.feature-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}
.feature-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  cursor:default;
}
.feature-card:hover{
  transform:translateY(-5px);
  box-shadow:0 16px 40px rgba(0,0,0,.2);
  border-color:rgba(245,166,35,0.3);
}
.feat-icon{
  font-size:2rem;margin-bottom:14px;display:block;
}
.feat-title{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:1.05rem;margin-bottom:8px;
}
.feat-desc{font-size:14px;color:var(--muted);line-height:1.6;}

/* about section */
.about-section{
  padding:80px 24px;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.about-inner{
  max-width:900px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr;gap:60px;
  align-items:center;
}
@media(max-width:640px){.about-inner{grid-template-columns:1fr;gap:32px;}}
.about-avatar{
  width:100%;aspect-ratio:1;max-width:280px;
  border-radius:24px;
  background:linear-gradient(135deg,var(--surface2),var(--bg));
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;margin:0 auto;
}
.about-text h2{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(1.6rem,3vw,2.2rem);letter-spacing:-1px;
  margin-bottom:14px;
}
.about-text p{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:18px;}
.about-links{display:flex;gap:10px;flex-wrap:wrap;}

/* contact strip */
.contact-strip{
  padding:60px 24px;
  max-width:700px;margin:0 auto;
  text-align:center;
}
.contact-strip h2{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(1.6rem,3vw,2.2rem);letter-spacing:-1px;
  margin-bottom:10px;
}
.contact-strip p{color:var(--muted);margin-bottom:24px;font-size:15px;}
.email-chip{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:100px;padding:10px 22px;
  font-size:15px;font-weight:500;color:var(--text);
  text-decoration:none;
  transition:border-color .2s,box-shadow .2s;
}
.email-chip:hover{
  border-color:var(--accent);
  box-shadow:0 0 20px var(--accent-glow);
}
.email-chip .dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--accent);flex-shrink:0;
}

/* footer */
footer{
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:24px;text-align:center;
  font-size:13px;color:var(--muted);
}
footer strong{color:var(--accent);}

/* ── APP LIST ── */
.page-wrap{max-width:800px;margin:0 auto;padding:40px 24px 80px;}
.page-header{
  display:flex;align-items:center;gap:14px;
  margin-bottom:32px;
}
.page-header h2{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(1.6rem,4vw,2.2rem);letter-spacing:-1px;
}
.apps-grid{display:flex;flex-direction:column;gap:12px;}
.app-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.app-card:hover{
  transform:translateX(6px);
  box-shadow:0 8px 32px rgba(0,0,0,.15);
  border-color:rgba(245,166,35,0.35);
}
.app-card-left{display:flex;align-items:center;gap:16px;}
.app-icon{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,var(--surface2),var(--bg));
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;flex-shrink:0;
}
.app-name{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:1rem;margin-bottom:3px;
}
.app-desc{font-size:13px;color:var(--muted);}
.app-arrow{color:var(--accent);font-size:1.2rem;flex-shrink:0;}

/* ── INNER APP PAGES ── */
.inner-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:32px;
  box-shadow:var(--card-shadow);
}
.inner-card h2{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:1.6rem;letter-spacing:-.5px;
  margin-bottom:8px;
}
.inner-card .subtitle{font-size:14px;color:var(--muted);margin-bottom:24px;}

/* inputs */
.field-label{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block;}
.ks-input{
  width:100%;padding:13px 16px;
  border-radius:12px;border:1.5px solid var(--border);
  background:var(--bg2);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  box-sizing:border-box;
  transition:border-color .2s,box-shadow .2s;
  outline:none;
}
.ks-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.ks-input.err{border-color:#FF5A5A;box-shadow:0 0 0 3px rgba(255,90,90,.15);}
.ks-select{
  width:100%;padding:13px 16px;
  border-radius:12px;border:1.5px solid var(--border);
  background:var(--bg2);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  outline:none;cursor:pointer;
  transition:border-color .2s;
}
.ks-select:focus{border-color:var(--accent);}
.helper-txt{font-size:13px;color:#FF5A5A;margin-top:4px;display:none;}

.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mt{margin-top:14px;}
.mt-sm{margin-top:10px;}

/* result box */
.result-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-top:16px;
}
.result-box p{color:var(--muted);font-size:14px;margin-bottom:4px;}
.result-box strong{font-size:1.5rem;font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);}

/* back-row */
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.back-btn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px;
  font-size:13px;font-weight:600;color:var(--muted);
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;
  transition:color .2s,background .2s;
}
.back-btn:hover{color:var(--text);background:var(--border);}
.app-footer-btns{
  display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;
  padding-top:24px;border-top:1px solid var(--border);
}

/* ── ABOUT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:32px;
  width:100%;max-width:460px;
  animation:fadeUp .3s ease;
}
.modal-box h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:10px;}
.modal-box p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:10px;}

/* ── SPECIAL: PASSWORD ── */
.bar-row{display:flex;gap:6px;margin:12px 0 8px;}
.bar-seg{flex:1;height:5px;border-radius:10px;background:var(--surface2);transition:background .4s;}
.pw-criteria{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
.criterion{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);transition:color .3s;}
.criterion.met{color:#4ade80;}
.crit-dot{width:7px;height:7px;border-radius:50%;background:var(--surface2);flex-shrink:0;transition:background .3s,box-shadow .3s;}
.criterion.met .crit-dot{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5);}
.verdict-row{display:flex;align-items:center;justify-content:space-between;min-height:40px;margin:6px 0;}
.verdict-lbl{font-size:1.4rem;font-weight:700;font-family:'Syne',sans-serif;transition:color .3s;}
.verdict-emoji{font-size:1.5rem;}
.tip-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--muted);margin-top:6px;}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px;}
.pw-wrap{position:relative;}
.score-chip{display:inline-block;font-size:12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 12px;color:var(--muted);margin-top:2px;}
.score-num{font-weight:700;}

/* ── DAY FINDER ── */
.day-result-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;margin:14px 0;}
.day-big{font-size:2.6rem;font-weight:800;font-family:'Syne',sans-serif;color:var(--accent);letter-spacing:-1px;}
.day-date-lbl{font-size:13px;color:var(--muted);margin-bottom:6px;}
.neighbors{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.nbr{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.nbr-lbl{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}
.nbr-day{font-size:1.1rem;font-weight:700;font-family:'Syne',sans-serif;}
.nbr-date{font-size:11px;color:var(--muted);margin-top:3px;}
.iq-box{background:linear-gradient(135deg,rgba(61,82,213,.15),rgba(79,100,232,.08));border:1px solid rgba(61,82,213,.3);border-radius:14px;padding:14px;text-align:center;margin:10px 0;font-size:13px;color:#a89fff;line-height:1.6;}

/* loading */
.day-loading{display:none;flex-direction:column;align-items:center;padding:24px 0;}
.spinner-wrap{position:relative;width:80px;height:80px;margin-bottom:20px;}
.sp-ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;}
.sp-ring.r1{border-top-color:var(--accent);animation:spin 1s linear infinite;}
.sp-ring.r2{inset:10px;border-right-color:#FF5A5A;animation:spin 1.5s linear infinite reverse;}
.sp-ring.r3{inset:22px;border-bottom-color:var(--indigo-soft);animation:spin .8s linear infinite;}
.sp-center{position:absolute;inset:35px;background:var(--accent);border-radius:50%;animation:spulse 1s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes spulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.load-phrase{font-size:13px;color:var(--accent);text-align:center;min-height:32px;max-width:240px;opacity:0;animation:fadeUp .5s ease forwards;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.reveal{animation:fadeUp .4s ease both;}

/* WHO table */
.who-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px;}
.who-table th{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);}
.who-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
.who-table tr:last-child td{border-bottom:none;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:100px;}
.tag.uw{background:rgba(96,165,250,.15);color:#60a5fa;}
.tag.nm{background:rgba(74,222,128,.15);color:#4ade80;}
.tag.ow{background:rgba(251,191,36,.15);color:#fbbf24;}
.tag.ob{background:rgba(248,113,113,.15);color:#f87171;}

@media(max-width:480px){
  .navbar{padding:0 18px;}
  .hero-cta{flex-direction:column;align-items:center;}
  .inner-card{padding:22px 18px;}
  .grid-3{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-logo" onclick="go('home')" style="cursor:pointer">KS<span style="-webkit-text-fill-color:inherit;color:inherit"> Tech</span></div>
  <div class="nav-right">
    <button class="nav-link" onclick="go('home')">🏠 Home</button>
    <button class="nav-link" onclick="go('apps')">⚡ Apps</button>
    <button class="nav-link" onclick="scrollContact()">✉️ Contact</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <span class="theme-icon moon">🌙</span>
      <span class="theme-icon sun">☀️</span>
    </button>
  </div>
</nav>

<div id="app"></div>

<script>
/* ── STARS ── */
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
function rsz(){canvas.width=innerWidth;canvas.height=innerHeight;}rsz();
addEventListener('resize',rsz);
const stars=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,a:Math.random()}));
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.a+=.003*(Math.random()>.5?1:-1);s.a=Math.max(.1,Math.min(.9,s.a));
    ctx.globalAlpha=s.a;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

  appEl.innerHTML=`<div class='page-wrap'>

          <small style='color:var(--muted);font-size:12px'>Day (1–31)</small>
          <input class='ks-input mt-sm' id='dobDD' placeholder='DD' type='number' min='1' max='31' oninput='validateDobField(this,1,31)'>
          <div class='helper-txt' id='dobDDHelp'>Day must be 1–31</div>
        </div>
        <div>
          <small style='color:var(--muted);font-size:12px'>Month (1–12)</small>
          <input class='ks-input mt-sm' id='dobMM' placeholder='MM' type='number' min='1' max='12' oninput='validateDobField(this,1,12)'>

        </div>
        <div>
          <small style='color:var(--muted);font-size:12px'>Year (1–present)</small>
          <input class='ks-input mt-sm' id='dobYY' placeholder='YYYY' type='number' min='1' max='2026' oninput='validateDobField(this,1,2026)'>
          <div class='helper-txt' id='dobYYHelp'>Year must be 1–2026</div>
        </div>
      </div>

      <div class='mt'><label class='field-label'>Target Age <span style='color:var(--sub)'>(optional)</span></label>

      <div class='helper-txt' id='targetAgeHelp'>Target age must be between 1 and 150</div></div>

function validateDobYY(el){
  const v=parseInt(el.value);
  const maxY=new Date().getFullYear();
  const helpEl=document.getElementById('dobYYHelp');
  if(el.value===''){ el.classList.remove('err'); helpEl.style.display='none'; return; }
  if(isNaN(v)||v<1||v>maxY){ el.classList.add('err'); helpEl.textContent='Year must be between 1 and '+maxY; helpEl.style.display='block'; }
  else{ el.classList.remove('err'); helpEl.style.display='none'; }
}
function validateDobField(el, min, max){
  const v=parseInt(el.value);
  const helpId=el.id+'Help';
  const helpEl=document.getElementById(helpId);
  if(el.value===''){ el.classList.remove('err'); if(helpEl)helpEl.style.display='none'; return; }
  if(isNaN(v)||v<min||v>max){ el.classList.add('err'); if(helpEl)helpEl.style.display='block'; }
  else{ el.classList.remove('err'); if(helpEl)helpEl.style.display='none'; }
}
function validateTargetAge(el){
  const v=parseInt(el.value);
  const helpEl=document.getElementById('targetAgeHelp');
  if(el.value===''){ el.classList.remove('err'); helpEl.style.display='none'; return; }
  if(isNaN(v)||v<1||v>150){ el.classList.add('err'); helpEl.style.display='block'; }
  else{ el.classList.remove('err'); helpEl.style.display='none'; }
}
function parseDOBParts(){
  const dd=+dobDD.value,mm=+dobMM.value,yy=+dobYY.value;
  if(!dd||!mm||!yy||dd<1||dd>31||mm<1||mm>12||yy<1){
    dobHelp.style.display='block';
    [dobDD,dobMM,dobYY].forEach(i=>i.classList.add('err'));return null;
  }
  const test=new Date(yy,mm-1,dd);
  if(test.getFullYear()!==yy||test.getMonth()!==mm-1||test.getDate()!==dd){
    dobHelp.style.display='block';
    [dobDD,dobMM,dobYY].forEach(i=>i.classList.add('err'));return null;
  }
  dobHelp.style.display='none';[dobDD,dobMM,dobYY].forEach(i=>i.classList.remove('err'));
  return test;
}
function startAgeCalc(){
  clearInterval(ageTimer);const dob=parseDOBParts();if(!dob)return;
  const name=uname.value||'You';const target=parseFloat(targetAge.value);
  ageTimer=setInterval(()=>{
    const now=new Date();let diff=now-dob;
    const y=Math.floor(diff/31557600000);diff-=y*31557600000;
    const mo=Math.floor(diff/2629800000);diff-=mo*2629800000;
    const d=Math.floor(diff/86400000);diff-=d*86400000;
    const h=Math.floor(diff/3600000);diff-=h*3600000;
    const mi=Math.floor(diff/60000);diff-=mi*60000;
    const s=Math.floor(diff/1000);
    let out=`<div class='result-box reveal'><p>${name}, your exact age is:</p><strong>${y} yrs &nbsp; ${mo} Mo &nbsp; ${d} days &nbsp; ${h} hrs &nbsp; ${mi} min &nbsp; ${s} sec</strong>`;
    if(!isNaN(target)){
      const remain=target*31557600000-(now-dob);
      if(remain>0){
        let r=remain;
        const ry=Math.floor(r/31557600000);r-=ry*31557600000;
        const rmo=Math.floor(r/2629800000);r-=rmo*2629800000;
        const rd=Math.floor(r/86400000);r-=rd*86400000;
        const rh=Math.floor(r/3600000);r-=rh*3600000;
        const rmi=Math.floor(r/60000);r-=rmi*60000;
        const rs=Math.floor(r/1000);
        out+=`<p style='margin-top:12px'>⏳ Time left to age ${target}:</p><strong>${ry} yrs &nbsp; ${rmo} Mo &nbsp; ${rd} days &nbsp; ${rh} hrs &nbsp; ${rmi} min &nbsp; ${rs} sec</strong>`;
      }else out+=`<p style='margin-top:12px'>✅ You already crossed age ${target}!</p>`;
    }
    out+='</div>';ageResult.innerHTML=out;
  },1000);
}

function gcd(a,b){return b?gcd(b,a%b):a;}
function lcm(a,b){return a*b/gcd(a,b);}

function calcBmi(){
  let weight=parseFloat(w.value),height=parseFloat(h.value);
  if(!weight||!height){bmiHelp.style.display='block';return;}
  bmiHelp.style.display='none';
  if(wUnit.value==='lb')weight*=0.453592;
  if(hUnit.value==='cm')height/=100;
  if(hUnit.value==='ft')height*=0.3048;
  if(hUnit.value==='in')height*=0.0254;
  const bmi=weight/(height*height);
  let status='',tagClass='';
  if(bmi<18.5){status='Underweight 🔵';tagClass='uw';}
  else if(bmi<25){status='Normal ✅';tagClass='nm';}
  else if(bmi<30){status='Overweight ⚠️';tagClass='ow';}
  else{status='Obese 🔴';tagClass='ob';}
  bmiResult.innerHTML=`<div class='result-box reveal'>
    <p>Your BMI</p><strong>${bmi.toFixed(2)}</strong>
    <p style='margin-top:10px'>WHO Status: <span class='tag ${tagClass}'>${status}</span></p>
  </div>`;
}

function startDayFinder(){
  const day=parseInt(dfDay.value),month=parseInt(dfMonth.value),year=parseInt(dfYear.value);

  if(!day||!month||!year||day<1||day>31||month<1||month>12||year<1||year>9999){dfHelp.style.display='block';return;}

  dfForm.style.display='none';dfResult.innerHTML='';

      dayFinderTimer=setTimeout(nextPhrase,interval);

    loading.style.display='none';
    const date=new Date(year,month-1,day);

      <button class='btn btn-secondary' style='width:100%' onclick='resetDayFinder()'>↩ Try Another Date</button>

  },10600);

function doWordCount(){
  const t=document.getElementById('wcText').value;
  const res=document.getElementById('wcResult');
  if(!t.trim()){res.innerHTML='';return;}
  const words=t.trim().split(/\s+/).filter(w=>w.length>0).length;
  const chars=t.length;
  const charsNoSpace=t.replace(/\s/g,'').length;
  const sentences=t.split(/[.!?]+/).filter(s=>s.trim().length>0).length;
  const paragraphs=t.split(/\n+/).filter(p=>p.trim().length>0).length;
  const readMins=Math.ceil(words/200);
  const freq={};
  t.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>2).forEach(w=>{freq[w]=(freq[w]||0)+1;});
  const topWords=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([w,c])=>"<span class='tag nm' style='margin:2px'>"+w+" ("+c+")</span>").join(' ');

}

function calcEmi(){
  const P=parseFloat(document.getElementById('emiPrincipal').value);
  const annualR=parseFloat(document.getElementById('emiRate').value);
  let months=parseInt(document.getElementById('emiTenure').value);
  const unit=document.getElementById('emiUnit').value;
  const helpEl=document.getElementById('emiHelp');
  if(unit==='y')months*=12;
  if(!P||!annualR||!months||P<=0||annualR<=0||months<=0){helpEl.style.display='block';return;}
  helpEl.style.display='none';
  const r=annualR/(12*100);
  const emi=P*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1);
  const total=emi*months;const interest=total-P;
  const fmt=n=>n.toLocaleString('en-IN',{maximumFractionDigits:2});
  document.getElementById('emiResult').innerHTML="<div class='result-box reveal'><table class='who-table'><tr><td>Monthly EMI</td><td><strong style='color:var(--accent);font-size:1.2rem'>"+fmt(emi)+"</strong></td></tr><tr><td>Principal</td><td><strong>"+fmt(P)+"</strong></td></tr><tr><td>Total Interest</td><td><strong style='color:#f87171'>"+fmt(interest)+"</strong></td></tr><tr><td>Total Payable</td><td><strong>"+fmt(total)+"</strong></td></tr><tr><td>Duration</td><td><strong>"+months+" months</strong></td></tr></table></div>";
}

function buildUcUnits(){
  const cat=UNIT_CATS[document.getElementById('ucCat').value];
  document.getElementById('ucFrom').innerHTML=cat.units.map(u=>"<option>"+u+"</option>").join('');
  document.getElementById('ucTo').innerHTML=cat.units.map((u,i)=>"<option"+(i===1?' selected':'')+">"+u+"</option>").join('');
  doUnitConv();
}
function doUnitConv(){
  const v=parseFloat(document.getElementById('ucVal').value);
  const res=document.getElementById('ucResult');
  if(isNaN(v)){res.innerHTML='';return;}
  const from=document.getElementById('ucFrom').value,to=document.getElementById('ucTo').value;
  const result=UNIT_CATS[document.getElementById('ucCat').value].convert(v,from,to);
  res.innerHTML="<div class='result-box reveal'><p>"+v+" "+from+" =</p><strong>"+parseFloat(result.toPrecision(8)).toLocaleString()+" "+to+"</strong></div>";
}

/* ═══════════════════════ STOPWATCH & TIMER ═══════════════════════ */
let swRunning=false,swStart=0,swElapsed=0,swInterval=null,swLapsList=[];
let cdRunning=false,cdEnd=0,cdInterval=null;
function renderTimer(){
  swRunning=false;swStart=0;swElapsed=0;swLapsList=[];cdRunning=false;cdEnd=0;
  clearInterval(swInterval);clearInterval(cdInterval);
  appEl.innerHTML=`<div class='page-wrap'>
    <div class='back-row'><button class='back-btn' onclick="go('apps')">← Apps</button></div>
    <div class='inner-card'>
      <h2>⏱️ Stopwatch & Timer</h2>
      <p class='subtitle'>Stopwatch with lap tracking, plus a countdown timer.</p>
      <div class='field-label' style='margin-bottom:10px'>🕐 Stopwatch</div>
      <div style='text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:14px'>
        <div id='swDisplay' style='font-family:Syne,sans-serif;font-size:3rem;font-weight:800;letter-spacing:2px;color:var(--accent)'>00:00.00</div>
      </div>
      <div style='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px'>
        <button class='btn btn-primary' id='swStartBtn' onclick='swToggle()'>▶ Start</button>
        <button class='btn btn-secondary' onclick='swLap()'>🏁 Lap</button>
        <button class='btn btn-ghost' onclick='swReset()'>↩ Reset</button>
      </div>
      <div id='swLaps' style='max-height:160px;overflow-y:auto;border-radius:12px;overflow:hidden'></div>
      <div style='border-top:1px solid var(--border);margin:24px 0'></div>
      <div class='field-label' style='margin-bottom:10px'>⏳ Countdown Timer</div>
      <div class='grid-3'>
        <div><small style='color:var(--muted);font-size:12px'>Hours</small><input class='ks-input mt-sm' id='cdH' placeholder='0' type='number' min='0' max='99'></div>
        <div><small style='color:var(--muted);font-size:12px'>Minutes</small><input class='ks-input mt-sm' id='cdM' placeholder='0' type='number' min='0' max='59'></div>
        <div><small style='color:var(--muted);font-size:12px'>Seconds</small><input class='ks-input mt-sm' id='cdS' placeholder='30' type='number' min='0' max='59'></div>
      </div>
      <div style='text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin:12px 0'>
        <div id='cdDisplay' style='font-family:Syne,sans-serif;font-size:2.4rem;font-weight:800;letter-spacing:2px;color:var(--accent)'>00:00:00</div>
      </div>
      <div style='display:flex;gap:10px;flex-wrap:wrap'>
        <button class='btn btn-primary' id='cdStartBtn' onclick='cdToggle()'>▶ Start</button>
        <button class='btn btn-ghost' onclick='cdReset()'>↩ Reset</button>
      </div>
      <div id='cdAlert'></div>
      ${appFooter('timer')}
    </div>
  </div>`;
}
function swFmt(ms){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');}
function swToggle(){
  if(swRunning){swElapsed+=Date.now()-swStart;clearInterval(swInterval);swRunning=false;document.getElementById('swStartBtn').textContent='▶ Resume';}
  else{swStart=Date.now();swRunning=true;swInterval=setInterval(()=>{document.getElementById('swDisplay').textContent=swFmt(swElapsed+Date.now()-swStart);},50);document.getElementById('swStartBtn').textContent='⏸ Pause';}
}
function swLap(){
  if(!swRunning&&swElapsed===0)return;
  swLapsList.push(swElapsed+(swRunning?Date.now()-swStart:0));
  document.getElementById('swLaps').innerHTML=swLapsList.map((l,i)=>"<div style='display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px'><span style='color:var(--muted)'>Lap "+(i+1)+"</span><strong>"+swFmt(l)+"</strong></div>").reverse().join('');
}
function swReset(){clearInterval(swInterval);swRunning=false;swElapsed=0;swLapsList=[];document.getElementById('swDisplay').textContent='00:00.00';document.getElementById('swStartBtn').textContent='▶ Start';document.getElementById('swLaps').innerHTML='';}
function cdFmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function cdToggle(){
  if(cdRunning){clearInterval(cdInterval);cdRunning=false;document.getElementById('cdStartBtn').textContent='▶ Resume';}
  else{
    if(!cdEnd){const total=(parseInt(document.getElementById('cdH').value)||0)*3600+(parseInt(document.getElementById('cdM').value)||0)*60+(parseInt(document.getElementById('cdS').value)||0);if(!total)return;cdEnd=Date.now()+total*1000;}
    cdRunning=true;document.getElementById('cdStartBtn').textContent='⏸ Pause';
    cdInterval=setInterval(()=>{const rem=Math.max(0,Math.round((cdEnd-Date.now())/1000));document.getElementById('cdDisplay').textContent=cdFmt(rem);if(rem===0){clearInterval(cdInterval);cdRunning=false;cdEnd=0;document.getElementById('cdStartBtn').textContent='▶ Start';document.getElementById('cdAlert').innerHTML="<div class='result-box reveal' style='text-align:center;margin-top:10px'>⏰ <strong>Time is up!</strong> 🎉</div>";}},300);
  }
}
function cdReset(){clearInterval(cdInterval);cdRunning=false;cdEnd=0;document.getElementById('cdDisplay').textContent='00:00:00';document.getElementById('cdStartBtn').textContent='▶ Start';['cdH','cdM','cdS'].forEach(id=>{document.getElementById(id).value='';});document.getElementById('cdAlert').innerHTML='';}

/* ═══════════════════════ RANDOM DECISION MAKER ═══════════════════════ */
let rdSpinning=false;
function renderDecision(){
  rdSpinning=false;
  appEl.innerHTML=`<div class='page-wrap'>
    <div class='back-row'><button class='back-btn' onclick="go('apps')">← Apps</button></div>
    <div class='inner-card'>
      <h2>🎲 Random Decision Maker</h2>
      <p class='subtitle'>Can't decide? Enter your options and let fate choose! 🌀</p>
      <label class='field-label'>Your Options <span style='color:var(--sub)'>(one per line, min 2)</span></label>
      <textarea class='ks-input' id='rdOptions' rows='6' placeholder='Pizza&#10;Burger&#10;Sushi&#10;Pasta' style='resize:vertical;line-height:1.8'></textarea>
      <div class='helper-txt' id='rdHelp'>Enter at least 2 options.</div>
      <div class='mt'><button class='btn btn-primary' id='rdBtn' onclick='spinDecision()'>🎲 Spin & Decide!</button></div>
      <div style='display:flex;justify-content:center;margin:20px 0'>
        <div style='position:relative'>
          <canvas id='rdWheel' width='260' height='260' style='border-radius:50%;display:none'></canvas>
          <div id='rdPointer' style='display:none;position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:2rem'>▼</div>
        </div>
      </div>
      <div id='rdResult'></div>
      ${appFooter('decision')}
    </div>
  </div>`;
}
function spinDecision(){
  const opts=document.getElementById('rdOptions').value.split('\n').map(o=>o.trim()).filter(o=>o.length>0);
  const helpEl=document.getElementById('rdHelp');
  if(opts.length<2){helpEl.style.display='block';return;}
  helpEl.style.display='none';if(rdSpinning)return;
  rdSpinning=true;const rdBtn=document.getElementById('rdBtn');rdBtn.disabled=true;
  document.getElementById('rdResult').innerHTML='';
  const canvas=document.getElementById('rdWheel');canvas.style.display='block';document.getElementById('rdPointer').style.display='block';
  const ctx=canvas.getContext('2d'),cx=130,cy=130,radius=118;
  const colors=['#F5A623','#3D52D5','#4ade80','#f87171','#a78bfa','#60a5fa','#fb923c','#34d399','#e879f9','#facc15','#38bdf8','#f472b6'];
  const arc=2*Math.PI/opts.length;
  const targetIdx=Math.floor(Math.random()*opts.length);
  const targetAngle=2*Math.PI*5+(2*Math.PI-targetIdx*arc-arc/2);
  const duration=3500,startTime=Date.now();
  function easeOut(t){return 1-Math.pow(1-t,4);}
  function draw(a){
    ctx.clearRect(0,0,260,260);
    opts.forEach((opt,i)=>{
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,radius,i*arc+a,(i+1)*arc+a);ctx.closePath();
      ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(i*arc+arc/2+a);ctx.textAlign='right';ctx.fillStyle='#fff';
      ctx.font='bold 12px Syne,sans-serif';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;
      ctx.fillText(opt.length>11?opt.slice(0,11)+'...':opt,radius-8,5);ctx.restore();
    });
    ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fillStyle='#0A0C14';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;ctx.stroke();
  }
  function animate(){
    const t=Math.min((Date.now()-startTime)/duration,1);draw(easeOut(t)*targetAngle);
    if(t<1){requestAnimationFrame(animate);}
    else{
      rdSpinning=false;rdBtn.disabled=false;
      document.getElementById('rdResult').innerHTML="<div class='result-box reveal' style='text-align:center'><div style='font-size:2.5rem;margin-bottom:8px'>🎉</div><p style='color:var(--muted)'>The decision is...</p><strong style='font-size:1.6rem;color:var(--accent)'>"+opts[targetIdx]+"</strong><p style='margin-top:8px;font-size:13px;color:var(--muted)'>Fate has spoken! 🌟</p></div>";
    }
  }
  animate();
}
